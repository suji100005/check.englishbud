<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Bud — 글쓰기 첨삭</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:      #2d5a2d;
      --green-mid:  #3d7a3d;
      --green-bg:   #eef5ee;
      --cream:      #f2ede6;
      --cream-dark: #e6e0d8;
      --red:        #c0392b;
      --red-bg:     #fde8e6;
      --ok:         #1e7e34;
      --text:       #1a1a1a;
      --muted:      #777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); min-height: 100vh; color: var(--text); }

    /* ── Header ── */
    header {
      background: var(--green); padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .logo-text { font-family: 'Poppins', sans-serif; color: #fff; font-size: 17px; font-weight: 700; line-height: 1.2; }
    .logo-sub  { color: rgba(255,255,255,.65); font-size: 12px; }

    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 48px; }
    .upload-inner { max-width: 480px; margin: 0 auto; }

    /* ── Name input ── */
    .name-input {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      border: 2px solid var(--cream-dark); border-radius: 12px;
      font-size: 16px; font-family: 'Noto Sans KR', sans-serif;
      background: #fff; outline: none; transition: border-color .2s;
    }
    .name-input:focus { border-color: var(--green-mid); }

    /* ── Drop zone ── */
    .drop-zone {
      background: #fff; border: 2px dashed var(--green-mid);
      border-radius: 18px; padding: 40px 24px; text-align: center;
      cursor: pointer; transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.over { background: var(--green-bg); }
    .drop-icon  { font-size: 44px; margin-bottom: 10px; }
    .drop-title { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 5px; }
    .drop-hint  { font-size: 13px; color: var(--muted); }

    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn {
      flex: 1; padding: 13px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif; transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-primary   { background: var(--green); color: #fff; }
    .btn-secondary { background: var(--cream-dark); color: var(--green); }

    .preview-wrap { margin-top: 12px; border-radius: 14px; overflow: hidden; background: #fff; }
    .preview-wrap img { width: 100%; max-height: 260px; object-fit: contain; display: block; }

    .btn-analyze {
      width: 100%; padding: 15px; background: var(--green); color: #fff;
      border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      margin-top: 12px; transition: opacity .15s;
    }
    .btn-analyze:active { opacity: .8; }

    /* ── Loader ── */
    .loader { text-align: center; padding: 60px 0; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--cream-dark);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin .75s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-title { font-size: 16px; font-weight: 700; color: var(--green); }
    .loader-sub   { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* ── Score card ── */
    .score-card {
      background: #fff; border-radius: 18px; padding: 22px 24px;
      margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .score-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
    }
    .score-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .score-date { font-size: 13px; color: var(--muted); }
    .score-main { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .score-total-num {
      font-family: 'Poppins', sans-serif; font-size: 52px; font-weight: 700;
      line-height: 1; min-width: 80px;
    }
    .score-total-denom { font-size: 20px; color: var(--muted); font-family: 'Poppins', sans-serif; }
    .score-bar-wrap { flex: 1; }
    .score-label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .score-bar-bg { background: var(--cream-dark); border-radius: 99px; height: 12px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }

    .score-cats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    @media (max-width: 480px) { .score-cats { grid-template-columns: repeat(3, 1fr); } }
    .score-cat {
      background: var(--cream); border-radius: 10px; padding: 8px 10px; text-align: center;
    }
    .score-cat-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .score-cat-val  { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; }
    .score-cat-max  { font-size: 10px; color: var(--muted); }

    /* ── Result 2-col ── */
    .result-cols {
      display: grid; grid-template-columns: 1fr;
      gap: 14px; align-items: start;
    }
    @media (min-width: 680px) { .result-cols { grid-template-columns: 1fr 1fr; } }

    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .card-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px;
    }

    /* Transcribed */
    .text-en { font-family: 'Poppins', sans-serif; font-size: 15px; line-height: 1.9; }
    .err-mark {
      background: var(--red-bg); color: var(--red);
      border-bottom: 2px solid var(--red);
      border-radius: 3px; padding: 0 2px;
    }

    /* Error count badge */
    .err-count {
      display: inline-block; background: var(--red); color: #fff;
      border-radius: 99px; font-size: 12px; font-weight: 700;
      padding: 1px 9px; margin-left: 6px; vertical-align: middle;
    }

    /* Error list */
    .err-item { padding: 11px 0; border-bottom: 1px solid var(--cream-dark); }
    .err-item:last-child { border-bottom: none; }
    .err-top {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 6px; margin-bottom: 4px;
    }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; white-space: nowrap;
    }
    .b-grammar       { background: #dbeafe; color: #1d4ed8; }
    .b-spelling      { background: #ffedd5; color: #c2410c; }
    .b-vocabulary    { background: #f3e8ff; color: #7e22ce; }
    .b-punctuation   { background: #dcfce7; color: #166534; }
    .b-capitalization{ background: #fef9c3; color: #854d0e; }

    .err-pair {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 6px; font-family: 'Poppins', sans-serif;
    }
    .err-old { color: var(--red); text-decoration: line-through; font-size: 14px; }
    .err-arr { color: #aaa; }
    .err-new { color: var(--ok); font-weight: 600; font-size: 14px; }
    .err-note { font-size: 12px; color: #555; line-height: 1.5; margin-top: 3px; }
    .no-err { color: var(--ok); font-size: 15px; padding: 4px 0; }

    /* Reset */
    .reset-btn {
      display: block; width: 100%; max-width: 480px; margin: 20px auto 0;
      padding: 14px; background: transparent; border: 2px solid var(--green);
      color: var(--green); border-radius: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: opacity .15s;
    }
    .reset-btn:active { opacity: .7; }

    .error-banner {
      background: var(--red-bg); color: var(--red); border-radius: 14px;
      padding: 16px 20px; margin-top: 14px; font-size: 14px; line-height: 1.6;
    }

    .hidden { display: none !important; }
    input[type=file] { display: none; }
  </style>
</head>
<body>

<header>
  <div>🌱</div>
  <div>
    <div class="logo-text">English Bud</div>
    <div class="logo-sub">글쓰기 첨삭 & 채점</div>
  </div>
</header>

<div class="wrap">

  <!-- ① Upload -->
  <div id="secUpload">
    <div class="upload-inner">
      <input class="name-input" id="studentName" type="text"
             placeholder="학생 이름 (예: 홍길동)" autocomplete="off">
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📝</div>
        <div class="drop-title">학생이 쓴 글 사진을 올려주세요</div>
        <div class="drop-hint">탭해서 선택하거나 사진을 끌어오세요</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary"   onclick="document.getElementById('camInput').click()">📷 카메라</button>
        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">🖼 갤러리</button>
      </div>
      <input type="file" id="fileInput" accept="image/*"                    onchange="onFile(this.files[0])">
      <input type="file" id="camInput"  accept="image/*" capture="environment" onchange="onFile(this.files[0])">
      <div id="previewWrap" class="preview-wrap hidden">
        <img id="preview" src="" alt="미리보기">
      </div>
      <button id="analyzeBtn" class="btn-analyze hidden" onclick="analyze()">🔍 채점 & 첨삭하기</button>
    </div>
  </div>

  <!-- ② Loading -->
  <div id="secLoad" class="hidden">
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-title">분석 중...</div>
      <div class="loader-sub" id="loaderSub">글씨를 읽고 오류를 전수 검사하고 있어요</div>
    </div>
  </div>

  <!-- ③ Results -->
  <div id="secResult" class="hidden">

    <!-- Score card -->
    <div class="score-card">
      <div class="score-header">
        <span class="score-name" id="rName"></span>
        <span class="score-date" id="rDate"></span>
      </div>
      <div class="score-main">
        <div>
          <span class="score-total-num" id="rTotalNum">—</span>
          <span class="score-total-denom">/100</span>
        </div>
        <div class="score-bar-wrap">
          <div class="score-label-row"><span>총점</span><span id="rTotalPct"></span></div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" id="rBar" style="width:0%"></div>
          </div>
        </div>
      </div>
      <div class="score-cats">
        <div class="score-cat">
          <div class="score-cat-name">문법</div>
          <div class="score-cat-val" id="sGrammar">—</div>
          <div class="score-cat-max">/30</div>
        </div>
        <div class="score-cat">
          <div class="score-cat-name">철자</div>
          <div class="score-cat-val" id="sSpelling">—</div>
          <div class="score-cat-max">/20</div>
        </div>
        <div class="score-cat">
          <div class="score-cat-name">어휘</div>
          <div class="score-cat-val" id="sVocab">—</div>
          <div class="score-cat-max">/20</div>
        </div>
        <div class="score-cat">
          <div class="score-cat-name">내용</div>
          <div class="score-cat-val" id="sContent">—</div>
          <div class="score-cat-max">/20</div>
        </div>
        <div class="score-cat">
          <div class="score-cat-name">구성</div>
          <div class="score-cat-val" id="sStructure">—</div>
          <div class="score-cat-max">/10</div>
        </div>
      </div>
    </div>

    <!-- Text + Errors -->
    <div class="result-cols">
      <div class="card">
        <div class="card-label">📖 학생이 쓴 글</div>
        <div class="text-en" id="rTranscribed"></div>
      </div>
      <div class="card">
        <div class="card-label">
          🔴 고쳐야 할 부분
          <span class="err-count" id="rErrCount">0</span>
        </div>
        <div id="rErrors"></div>
      </div>
    </div>

    <button class="reset-btn" onclick="reset()">↩ 다시 첨삭하기</button>
  </div>

  <div id="secError" class="error-banner hidden"></div>
</div>

<script>
  let compressed = null;

  const SCORE_COLORS = {
    high:   '#1e7e34',  // 90+
    good:   '#2d7d46',  // 70-89
    mid:    '#b45309',  // 50-69
    low:    '#c0392b',  // 0-49
  };

  function scoreColor(pct) {
    if (pct >= 90) return SCORE_COLORS.high;
    if (pct >= 70) return SCORE_COLORS.good;
    if (pct >= 50) return SCORE_COLORS.mid;
    return SCORE_COLORS.low;
  }

  const TYPE_KO = {
    grammar: '문법', spelling: '철자', vocabulary: '어휘',
    punctuation: '구두점', capitalization: '대소문자'
  };
  const TYPE_CLASS = {
    grammar: 'b-grammar', spelling: 'b-spelling', vocabulary: 'b-vocabulary',
    punctuation: 'b-punctuation', capitalization: 'b-capitalization'
  };

  // Drag & drop
  const dz = document.getElementById('dropZone');
  dz.addEventListener('click',     () => document.getElementById('fileInput').click());
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) onFile(f);
  });

  function onFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      compressed = await shrink(e.target.result, 1200, 0.82);
      document.getElementById('preview').src = e.target.result;
      show('previewWrap'); show('analyzeBtn');
    };
    reader.readAsDataURL(file);
  }

  function shrink(dataUrl, maxPx, quality) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = dataUrl;
    });
  }

  async function analyze() {
    if (!compressed) return;
    const studentName = document.getElementById('studentName').value.trim();
    hide('secUpload'); hide('secError'); show('secLoad');
    startElapsed();
    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: compressed, studentName })
      });
      const raw = await res.text();
      let data;
      try { data = JSON.parse(raw); }
      catch (_) { throw new Error('서버 응답 오류 (' + res.status + '): ' + raw.slice(0, 120)); }

      if (data.error) throw new Error(data.error);
      renderResult(data, studentName);
    } catch (err) {
      hide('secLoad'); show('secUpload');
      document.getElementById('secError').textContent = '오류: ' + err.message;
      show('secError');
    } finally {
      stopElapsed();
    }
  }

  // 로딩 경과 시간 표시 (Render는 한동안 안 쓰면 첫 요청이 느릴 수 있어요)
  let elapsedTimer = null;
  function startElapsed() {
    const el = document.getElementById('loaderSub');
    const t0 = Date.now();
    stopElapsed();
    elapsedTimer = setInterval(() => {
      const s = Math.floor((Date.now() - t0) / 1000);
      el.textContent = `글씨를 읽고 오류를 전수 검사하고 있어요 (${s}초)`;
    }, 1000);
  }
  function stopElapsed() { if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; } }

  function renderResult(d, studentName) {
    const errors  = Array.isArray(d.errors) ? d.errors : [];
    const scores  = d.scores || {};
    const total   = scores.total ?? 0;
    const pct     = Math.min(100, Math.max(0, total));
    const color   = scoreColor(pct);
    const now     = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    // Header
    document.getElementById('rName').textContent = studentName || '이름 없음';
    document.getElementById('rDate').textContent = dateStr;

    // Score
    document.getElementById('rTotalNum').textContent = total;
    document.getElementById('rTotalNum').style.color = color;
    document.getElementById('rTotalPct').textContent = pct + '점';
    const bar = document.getElementById('rBar');
    bar.style.background = color;
    setTimeout(() => { bar.style.width = pct + '%'; }, 50);

    document.getElementById('sGrammar').textContent   = scores.grammar   ?? '—';
    document.getElementById('sSpelling').textContent  = scores.spelling  ?? '—';
    document.getElementById('sVocab').textContent     = scores.vocabulary ?? '—';
    document.getElementById('sContent').textContent   = scores.content   ?? '—';
    document.getElementById('sStructure').textContent = scores.structure ?? '—';

    // Transcribed + highlights
    document.getElementById('rTranscribed').innerHTML =
      highlightErrors(escHtml(d.transcribed || '(인식 불가)'), errors);

    // Error count
    document.getElementById('rErrCount').textContent = errors.length;

    // Error list
    const errDiv = document.getElementById('rErrors');
    if (errors.length === 0) {
      errDiv.innerHTML = '<div class="no-err">✨ 오류가 없어요! 완벽해요!</div>';
    } else {
      errDiv.innerHTML = errors.map(e => {
        const typeKo  = TYPE_KO[e.type]   || e.type || '';
        const typeCls = TYPE_CLASS[e.type] || 'b-grammar';
        return `<div class="err-item">
          <div class="err-top">
            <span class="badge ${typeCls}">${typeKo}</span>
            <div class="err-pair">
              <span class="err-old">${escHtml(e.original||'')}</span>
              <span class="err-arr">→</span>
              <span class="err-new">${escHtml(e.corrected||'')}</span>
            </div>
          </div>
          <div class="err-note">${escHtml(e.note||'')}</div>
        </div>`;
      }).join('');
    }

    hide('secLoad'); show('secResult');
  }

  function highlightErrors(html, errors) {
    errors.forEach(e => {
      if (!e.original) return;
      try {
        const esc = String(e.original).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        html = html.replace(new RegExp(esc, 'i'), m => `<span class="err-mark">${m}</span>`);
      } catch (_) { /* 하이라이트 실패해도 무시 */ }
    });
    return html;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function reset() {
    compressed = null;
    document.getElementById('preview').src = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('camInput').value  = '';
    hide('previewWrap'); hide('analyzeBtn'); hide('secResult'); hide('secError');
    show('secUpload');
    window.scrollTo(0, 0);
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden');    }
</script>

</body>
</html>
