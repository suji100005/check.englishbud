# Render 배포 설정 (Blueprint)
# GitHub 저장소를 Render에 연결하면 이 파일을 자동으로 읽어 웹 서비스를 만듭니다.
services:
  - type: web
    name: englishbud-checklist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render 대시보드에서 직접 입력 (보안)
      - key: GOOGLE_SHEETS_URL
        sync: false          # Apps Script 웹앱 URL (데이터 수집용, 선택)
